server {
    listen 8080;
    default_type application/json;
    access_log off;

    # Healthcheck endpoint
    location = /actuator/health {
        return 200 '{"status":"UP"}';
    }

    # Overview — 4 stat cards
    location = /api/dashboard/overview {
        return 200 '{"kpiCards":[{"widgetType":"stat-card","title":"Student Success Rate","value":78.4,"unit":"%","trend":"up","delta":2.1,"periodId":"mock","scope":{"scopeType":"institution","scopeId":"ENIT"}},{"widgetType":"stat-card","title":"Attendance Rate","value":91.2,"unit":"%","trend":"stable","delta":0.3,"periodId":"mock","scope":{"scopeType":"institution","scopeId":"ENIT"}},{"widgetType":"stat-card","title":"Budget Execution Rate","value":85.7,"unit":"%","trend":"up","delta":4.5,"periodId":"mock","scope":{"scopeType":"institution","scopeId":"ENIT"}},{"widgetType":"stat-card","title":"Absenteeism Rate","value":6.3,"unit":"%","trend":"down","delta":-1.2,"periodId":"mock","scope":{"scopeType":"institution","scopeId":"ENIT"}}],"openAlertsCount":3,"recommendationsCount":2}';
    }

    # Trends — line chart
    location = /api/dashboard/trends {
        return 200 '{"widgetType":"chart","chartType":"line","title":"Mock Trend","xAxis":["2024-S1","2024-S2","2025-S1"],"categories":null,"series":[{"key":"value","label":"Value","data":[72.1,75.4,78.4],"unit":"%"}]}';
    }

    # Comparison — bar chart
    location = /api/dashboard/comparison {
        return 200 '{"widgetType":"chart","chartType":"bar","title":"Mock Comparison","xAxis":null,"categories":["ENIT","FSEG","IHEC"],"series":[{"key":"value","label":"Value","data":[78.4,65.2,83.1],"unit":"%"}]}';
    }

    # Finance
    location = /api/dashboard/finance {
        return 200 '{"allocatedVsConsumedChart":{"widgetType":"chart","chartType":"stacked-bar","title":"Budget","xAxis":null,"categories":["ENIT","FSEG"],"series":[{"key":"allocated","label":"Allocated","data":[500000,320000],"unit":"TND"},{"key":"consumed","label":"Consumed","data":[428500,274240],"unit":"TND"}]},"spendingByDepartmentChart":{"widgetType":"chart","chartType":"bar","title":"Cost/Student","xAxis":null,"categories":["ENIT","FSEG"],"series":[{"key":"costPerStudent","label":"Cost","data":[4285,3428],"unit":"TND"}]}}';
    }

    # HR
    location = /api/dashboard/hr {
        return 200 '{"headcountChart":{"widgetType":"chart","chartType":"bar","title":"Headcount","xAxis":null,"categories":["ENIT","FSEG"],"series":[{"key":"teaching","label":"Teaching","data":[120,85],"unit":"persons"}]},"teachingLoadChart":{"widgetType":"chart","chartType":"bar","title":"Load","xAxis":null,"categories":["ENIT","FSEG"],"series":[{"key":"load","label":"Load","data":[18.5,16.2],"unit":"hrs/wk"}]},"absenteeismChart":{"widgetType":"chart","chartType":"bar","title":"Absenteeism","xAxis":null,"categories":["ENIT","FSEG"],"series":[{"key":"rate","label":"Rate","data":[6.3,8.1],"unit":"%"}]}}';
    }

    # Alerts
    location = /api/dashboard/alerts {
        return 200 '{"alertList":{"widgetType":"alert-list","title":"Alerts","items":[{"alertId":"mock-001","severity":"high","alertType":"ACADEMIC","message":"Mock alert — backend is in stub mode.","institutionId":"mock","periodId":"mock","status":"open","observedValue":65.0,"thresholdValue":70.0}]},"summary":{"totalOpen":1,"bySeverity":{"critical":0,"high":1,"medium":0,"low":0}}}';
    }

    # Insights
    location = /api/dashboard/insights {
        return 200 '{"executiveSummary":{"widgetType":"insight-card","title":"Stub Mode Active","summaryText":"Backend is running as a lightweight mock container. Start the real Spring Boot service for live data.","confidenceScore":1.0,"insightType":"EXECUTIVE_SUMMARY"},"topRecommendations":{"widgetType":"recommendation-list","title":"Recommendations","items":[]}}';
    }

    # Catch-all
    location / {
        return 200 '{"status":"UP"}';
    }
}
