services:

  postgres:
    image: postgres:16-alpine
    container_name: ucar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ucar_db
      POSTGRES_USER: ucar_user
      POSTGRES_PASSWORD: ucar_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ucar_user -d ucar_db"]
      interval: 10s
      timeout: 5s
      retries: 5

